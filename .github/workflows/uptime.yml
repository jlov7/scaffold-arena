name: Production Uptime Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Run production health checks
        id: checks
        shell: bash
        run: |
          set +e

          FRONTEND_URL="${{ vars.PROD_FRONTEND_URL }}"
          BACKEND_URL="${{ vars.PROD_BACKEND_URL }}"

          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="https://scaffold-arena.vercel.app"
          fi

          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://scaffold-arena-production.up.railway.app"
          fi

          REPORT_FILE="uptime-report.md"
          STATUS=0

          check() {
            local name="$1"
            local url="$2"
            local expected="$3"
            local code
            code=$(curl -sS -o /tmp/uptime-body.txt -w "%{http_code}" "$url")
            if [ "$code" != "$expected" ]; then
              STATUS=1
              {
                echo "- FAIL: ${name} (${url}) expected ${expected} got ${code}"
                echo "  - Body preview: \`$(head -c 200 /tmp/uptime-body.txt | tr '\n' ' ')\`"
              } >> "$REPORT_FILE"
            else
              echo "- PASS: ${name} (${url}) -> ${code}" >> "$REPORT_FILE"
            fi
          }

          {
            echo "# Production Uptime Report"
            echo ""
            echo "- Timestamp (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- Frontend URL: ${FRONTEND_URL}"
            echo "- Backend URL: ${BACKEND_URL}"
            echo ""
          } > "$REPORT_FILE"

          check "Frontend root" "${FRONTEND_URL}" "200"
          check "Frontend deep-link (/history)" "${FRONTEND_URL}/history" "200"
          check "Backend health" "${BACKEND_URL}/api/health" "200"
          check "Backend meta" "${BACKEND_URL}/api/meta" "200"

          cat "$REPORT_FILE" >> "$GITHUB_STEP_SUMMARY"

          if [ "$STATUS" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Create or update uptime incident issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const title = "[Uptime] Production health checks failing";
            const report = fs.readFileSync("uptime-report.md", "utf8");
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `${report}\n\nRun: ${runUrl}`;

            const { owner, repo } = context.repo;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing uptime incident issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.info(`Created uptime incident issue #${created.data.number}`);
            }
